name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'e2e/**'
              - 'compose.yml'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace
          POSTGRES_DB: marketplace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketplace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...
        env:
          TEST_DATABASE_URL: postgres://marketplace:marketplace@localhost:5432/marketplace?sslmode=disable

      # Render the profile to a text report. The combined summary is written by
      # the `coverage` job from the uploaded artifact (a step summary is
      # per-job, so cross-job aggregation has to go through an artifact).
      - name: Generate coverage report
        if: always()
        run: |
          [ -f coverage.out ] || { echo "no coverage profile (tests did not complete)"; exit 0; }
          go tool cover -func=coverage.out -o coverage.txt
          echo "Backend coverage: $(grep '^total:' coverage.txt | awk '{print $3}')"

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.out
            backend/coverage.txt
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      # test:coverage emits coverage/coverage-summary.json; the combined summary
      # is written by the `coverage` job from this uploaded artifact.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build
        run: npm run build

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # global-setup builds + boots the compose stack (frontend + backend +
      # Postgres) from a clean DB, runs the journeys, then tears it down.
      - name: Run E2E tests
        run: npm test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # Combine the backend + frontend coverage artifacts into a single step
  # summary. Runs after both (whichever actually ran) so the run's summary page
  # shows one unified "Coverage" section instead of one per job. !cancelled()
  # lets it run even when a job was skipped (only one side changed) or failed.
  coverage:
    name: Coverage report
    needs: [changes, backend, frontend]
    if: ${{ !cancelled() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Write combined summary
        run: |
          bep=artifacts/backend-coverage/coverage.out
          bef=artifacts/backend-coverage/coverage.txt
          fe=artifacts/frontend-coverage/coverage-summary.json
          {
            echo "## Coverage"
            echo ""

            if [ -f "$bep" ]; then
              echo "### Backend (Go — statements)"
              echo ""
              echo "| Package | Coverage |"
              echo "| --- | --- |"
              # Aggregate the coverage profile into per-package statement
              # coverage: covered statements / total statements, grouped by the
              # package dir (module root stripped for readability).
              awk '
                NR>1 {
                  split($1,a,":"); file=a[1]
                  n=split(file,p,"/"); pkg=p[2]
                  for(i=3;i<n;i++) pkg=pkg"/"p[i]
                  tot[pkg]+=$2; if($3>0) cov[pkg]+=$2
                }
                END { for(k in tot) printf "%s\t%.1f%% (%d/%d)\n", k, cov[k]/tot[k]*100, cov[k], tot[k] }
              ' "$bep" | sort | awk -F'\t' '{printf "| %s | %s |\n", $1, $2}'
              awk 'NR>1{t+=$2; if($3>0)c+=$2} END{printf "| **total** | **%.1f%% (%d/%d)** |\n", c/t*100, c, t}' "$bep"
              if [ -f "$bef" ]; then
                echo ""
                echo "<details><summary>Per-function coverage</summary>"
                echo ""
                echo '```'
                cat "$bef"
                echo '```'
                echo "</details>"
              fi
            else
              echo "### Backend — _not run_"
            fi
            echo ""

            if [ -f "$fe" ]; then
              echo "### Frontend (Vitest)"
              echo ""
              echo "| Metric | Coverage |"
              echo "| --- | --- |"
              jq -r '.total as $t | ("lines","statements","functions","branches")
                     | "| \(.) | \($t[.].pct)% (\($t[.].covered)/\($t[.].total)) |"' "$fe"
            else
              echo "### Frontend — _not run_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
