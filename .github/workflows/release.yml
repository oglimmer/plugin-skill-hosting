name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create GitHub Release
  packages: write      # push to ghcr.io

jobs:
  release:
    name: Build & publish images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oglimmer/plugin-skill-hosting-backend:${{ steps.version.outputs.version }}
            ghcr.io/oglimmer/plugin-skill-hosting-backend:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/oglimmer/plugin-skill-hosting-frontend:${{ steps.version.outputs.version }}
            ghcr.io/oglimmer/plugin-skill-hosting-frontend:latest
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
            VITE_GIT_COMMIT=${{ github.sha }}
            VITE_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
