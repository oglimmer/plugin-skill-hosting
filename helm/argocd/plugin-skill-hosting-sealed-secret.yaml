---
# Environment-specific SealedSecret for the production deployment of the
# plugin-skill-hosting chart. Kept here — alongside the Argo CD Application —
# rather than inside the chart itself, because SealedSecret ciphertext is
# scoped to a specific Sealed Secrets controller key, namespace, and name,
# and therefore cannot ship inside a reusable chart.
#
# Name + namespace match what the chart's `psh.secretName` helper renders
# for release name "plugin-skill-hosting" deployed into the "default"
# namespace (see helm/argocd/plugin-skill-hosting-app.yaml).
#
# To rotate: re-run the kubeseal pipeline documented in
# helm/plugin-skill-hosting/README.md (§Sealed secret) and replace this file.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: plugin-skill-hosting-secret
  namespace: default
spec:
  encryptedData:
    ANTHROPIC_API_KEY: 
    JWT_SECRET: 
    METRICS_TOKEN: 
    OIDC_CLIENT_SECRET: 
    POSTGRES_PASSWORD: 
  template:
    metadata:
      name: plugin-skill-hosting-secret
      namespace: default
