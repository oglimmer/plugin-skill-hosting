{{- /*
  CiliumEnvoyConfig for plugin-skill-hosting.

  Rendered only when:
    ingress.enabled                   = true
    ingress.className                 = "cilium"
    ingress.cilium.envoyConfigEnabled = true

  Requires Cilium ≥ 1.14 with the Ingress Controller enabled:
    ingressController.enabled = true   (Cilium Helm chart)

  What it configures
  ──────────────────
  1. Request body limit (maxRequestBodyBytes)
     Envoy's default per-request buffer is 1 MiB which is far too small for
     git push payloads.  The Buffer HTTP filter raises it to
     ingress.cilium.maxRequestBodyBytes (default 50 MiB).

  2. SSE idle timeout (/mcp prefix)
     MCP Streamable HTTP keeps a long-lived GET stream open.  Without
     explicit configuration, Envoy's 5-minute idle timeout would kill it.
     We override the route-level idle_timeout for /mcp to
     ingress.cilium.sseIdleTimeoutSeconds (default 3600 s).

  Implementation notes
  ────────────────────
  • The `services` list tells Cilium which backend Services this config
    applies to; Cilium merges it with the Ingress-generated Envoy config.
  • The listener / route names below match what Cilium generates for a
    standard Ingress resource.  If your Cilium version uses different names
    (check with `cilium ingress list`), adjust accordingly.
  • Increasing maxRequestBytes globally is intentional — git push can come
    in on /git from any client, so we apply it to the full listener rather
    than a single route.
*/}}
{{- if and .Values.ingress.enabled (eq .Values.ingress.className "cilium") .Values.ingress.cilium.envoyConfigEnabled }}
apiVersion: cilium.io/v2
kind: CiliumEnvoyConfig
metadata:
  name: {{ include "psh.fullname" . }}-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "psh.labels" . | nindent 4 }}
spec:
  # Scope this config to the backend and frontend Services managed by this
  # release so it does not interfere with other workloads in the namespace.
  services:
    - name: {{ include "psh.backend.fullname" . }}
      namespace: {{ .Release.Namespace }}
    - name: {{ include "psh.frontend.fullname" . }}
      namespace: {{ .Release.Namespace }}

  resources:
    # ── HTTP Connection Manager ──────────────────────────────────────────────
    # Patch the Envoy listener Cilium creates for this Ingress.
    - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
      name: {{ .Release.Namespace }}/{{ include "psh.fullname" . }}
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                # Allow the connection to stay open as long as any stream is
                # active (0 = disabled).  The per-route idle_timeout on /mcp
                # still controls individual stream lifetime.
                stream_idle_timeout: 0s
                http_filters:
                  # Buffer filter: raise the per-request body limit so that
                  # large git push payloads are not rejected with 413.
                  - name: envoy.filters.http.buffer
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
                      max_request_bytes: {{ .Values.ingress.cilium.maxRequestBodyBytes }}
                  # Router must be the last filter in the chain.
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── Route Configuration ──────────────────────────────────────────────────
    # Override idle_timeout for /mcp routes so SSE streams are not reaped.
    - "@type": type.googleapis.com/envoy.config.route.v3.RouteConfiguration
      name: {{ .Release.Namespace }}/{{ include "psh.fullname" . }}
      virtual_hosts:
        {{- range .Values.ingress.hosts }}
        - name: {{ .host }}
          domains:
            - {{ .host | quote }}
          routes:
            # /mcp — MCP Streamable HTTP (SSE).  Set a long idle timeout so
            # the stream is not killed by Envoy before the client disconnects.
            - match:
                prefix: "/mcp"
              route:
                cluster: {{ $.Release.Namespace }}/{{ include "psh.backend.fullname" $ }}/{{ $.Values.backend.service.port }}
                # 0s timeout = no absolute deadline (stream lives until idle).
                timeout: 0s
                idle_timeout: {{ $.Values.ingress.cilium.sseIdleTimeoutSeconds }}s
            # Catch-all — normal request timeout.
            - match:
                prefix: "/"
              route:
                cluster: {{ $.Release.Namespace }}/{{ include "psh.backend.fullname" $ }}/{{ $.Values.backend.service.port }}
                timeout: 60s
        {{- end }}
{{- end }}
