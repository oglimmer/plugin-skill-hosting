apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "psh.backend.fullname" . }}
  labels:
    {{- include "psh.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "psh.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "psh.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "psh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Values.backend.name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: DATA_DIR
          value: /data
        - name: PUBLIC_BASE_URL
          value: {{ .Values.publicBaseURL | quote }}
        - name: MARKETPLACE_NAME
          value: {{ .Values.marketplaceName | default "oglimmer-marketplace" | quote }}
        {{- if .Values.postgres.enabled }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          value: {{ include "psh.postgres.fullname" . | quote }}
        - name: DATABASE_URL
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):{{ .Values.postgres.service.port }}/$(POSTGRES_DB)?sslmode=disable"
        {{- else }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: DATABASE_URL
        {{- end }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: JWT_SECRET
        - name: AUTH_MODE
          value: {{ .Values.auth.mode | quote }}
        {{- if eq .Values.auth.mode "oidc" }}
        - name: OIDC_ISSUER_URL
          value: {{ .Values.auth.oidc.issuerURL | quote }}
        - name: OIDC_CLIENT_ID
          value: {{ .Values.auth.oidc.clientID | quote }}
        - name: OIDC_REDIRECT_URL
          value: {{ .Values.auth.oidc.redirectURL | quote }}
        - name: OIDC_SCOPES
          value: {{ .Values.auth.oidc.scopes | quote }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: OIDC_CLIENT_SECRET
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
      volumes:
      - name: data
        {{- if .Values.backend.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "psh.backend.fullname" . }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
