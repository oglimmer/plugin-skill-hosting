{{- if and .Values.backend.persistence.enabled (eq .Values.backend.persistence.accessMode "ReadWriteOnce") (gt (int .Values.backend.replicaCount) 1) }}
{{- fail "backend.replicaCount > 1 is unsafe with backend.persistence.enabled=true and ReadWriteOnce storage: pods would race on the same git repo on disk. Set backend.persistence.accessMode=ReadWriteMany on a shared storage class, or scale back to 1 replica." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "psh.backend.fullname" . }}
  labels:
    {{- include "psh.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "psh.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.backend.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "psh.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "psh.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Values.backend.name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: DATA_DIR
          value: /data
        - name: PUBLIC_BASE_URL
          value: {{ .Values.publicBaseURL | quote }}
        {{- with .Values.corsAllowedOrigins }}
        - name: CORS_ALLOWED_ORIGINS
          value: {{ join "," . | quote }}
        {{- end }}
        - name: MARKETPLACE_NAME
          value: {{ .Values.marketplaceName | default "oglimmer-marketplace" | quote }}
        - name: DEFAULT_LICENSE
          value: {{ .Values.defaultLicense | default "MIT" | quote }}
        {{- if .Values.postgres.enabled }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          value: {{ include "psh.postgres.fullname" . | quote }}
        - name: DATABASE_URL
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):{{ .Values.postgres.service.port }}/$(POSTGRES_DB)?sslmode=disable"
        {{- else }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: DATABASE_URL
        {{- end }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: JWT_SECRET
        # Optional: a dedicated key for encrypting API tokens at rest. When
        # absent the backend derives one from JWT_SECRET. Set it (and keep it
        # stable) to decouple API-token display from JWT_SECRET rotation.
        - name: API_TOKEN_ENC_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: API_TOKEN_ENC_KEY
              optional: true
        - name: AUTH_MODE
          value: {{ .Values.auth.mode | quote }}
        {{- if eq .Values.auth.mode "oidc" }}
        - name: OIDC_ISSUER_URL
          value: {{ .Values.auth.oidc.issuerURL | quote }}
        - name: OIDC_CLIENT_ID
          value: {{ .Values.auth.oidc.clientID | quote }}
        - name: OIDC_REDIRECT_URL
          value: {{ .Values.auth.oidc.redirectURL | quote }}
        - name: OIDC_SCOPES
          value: {{ .Values.auth.oidc.scopes | quote }}
        {{- with .Values.auth.oidc.googleWorkspaceDomains }}
        - name: OIDC_GOOGLE_WORKSPACE_DOMAINS
          value: {{ join "," . | quote }}
        {{- end }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: OIDC_CLIENT_SECRET
        {{- end }}
        {{- if .Values.backend.rematerializeOnStartup }}
        - name: REMATERIALIZE_ON_STARTUP
          value: "true"
        {{- end }}
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: ANTHROPIC_API_KEY
              optional: true
        {{- with .Values.anthropic.model }}
        - name: ANTHROPIC_MODEL
          value: {{ . | quote }}
        {{- end }}
        {{- if .Values.backend.metrics.enabled }}
        - name: METRICS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: METRICS_TOKEN
              optional: true
        {{- end }}
        {{- if .Values.mcpOAuth.clientID }}
        - name: MCP_OAUTH_CLIENT_ID
          value: {{ .Values.mcpOAuth.clientID | quote }}
        - name: MCP_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: MCP_OAUTH_CLIENT_SECRET
        {{- with .Values.mcpOAuth.redirectURIs }}
        - name: MCP_OAUTH_REDIRECT_URIS
          value: {{ join "," . | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.externalGit.remoteURL }}
        - name: EXTERNAL_GIT_REMOTE_URL
          value: {{ .Values.externalGit.remoteURL | quote }}
        - name: EXTERNAL_GIT_BRANCH
          value: {{ .Values.externalGit.branch | default "main" | quote }}
        - name: EXTERNAL_GIT_USERNAME
          value: {{ .Values.externalGit.username | default "x-access-token" | quote }}
        - name: EXTERNAL_GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: EXTERNAL_GIT_TOKEN
              optional: true
        {{- end }}
        - name: AUDIT_ENABLED
          value: {{ .Values.audit.enabled | quote }}
        {{- if .Values.audit.enabled }}
        - name: AUDIT_INTERVAL
          value: {{ .Values.audit.interval | default "24h" | quote }}
        - name: AUDIT_ALERT_THRESHOLD
          value: {{ .Values.audit.alertThreshold | default 70 | quote }}
        {{- with .Values.audit.alertEmails }}
        - name: AUDIT_ALERT_EMAILS
          value: {{ join "," . | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.smtp.host }}
        - name: SMTP_HOST
          value: {{ .Values.smtp.host | quote }}
        - name: SMTP_PORT
          value: {{ .Values.smtp.port | default 587 | quote }}
        - name: SMTP_USE_TLS
          value: {{ .Values.smtp.useTLS | default true | quote }}
        {{- with .Values.smtp.username }}
        - name: SMTP_USERNAME
          value: {{ . | quote }}
        {{- end }}
        {{- with .Values.smtp.from }}
        - name: SMTP_FROM
          value: {{ . | quote }}
        {{- end }}
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "psh.secretName" . }}
              key: SMTP_PASSWORD
              optional: true
        {{- end }}
        # Go's os/user.Current() requires either CGO or $USER to be set.
        # The container runs as uid 10001 which has no /etc/passwd entry and
        # the binary is compiled without CGO, so we inject USER explicitly.
        - name: USER
          value: "nonroot"
        {{- with .Values.backend.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
      volumes:
      - name: data
        {{- if .Values.backend.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "psh.backend.fullname" . }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
