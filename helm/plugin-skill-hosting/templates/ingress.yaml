{{- if .Values.ingress.enabled -}}
{{- /*
  Build the final annotations map.  Start with whatever the user supplied,
  then inject controller-specific entries automatically so callers don't need
  to know the exact annotation key / value format:

    • Traefik: adds router.middlewares pointing at the Middleware resource
               created by templates/traefik-middleware.yaml, but only when
               ingress.traefik.middlewareEnabled=true.
*/}}
{{- $annotations := deepCopy (.Values.ingress.annotations | default dict) }}
{{- if and (eq .Values.ingress.className "traefik") .Values.ingress.traefik.middlewareEnabled }}
  {{- $mwRef := printf "%s-%s-proxy@kubernetescrd" .Release.Namespace (include "psh.fullname" .) }}
  {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" $mwRef }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "psh.fullname" . }}
  labels:
    {{- include "psh.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- /*
              Publish /metrics on the public ingress only when explicitly
              opted in. Pair this with a METRICS_TOKEN in the sealed secret;
              without one the endpoint would be world-readable. pathType
              Exact wins over the SPA catch-all "/" so ordering is moot.
          */}}
          {{- if and $.Values.backend.metrics.enabled $.Values.backend.metrics.exposeOnIngress }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "psh.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .backend "api" }}
                name: {{ include "psh.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
                {{- else if eq .backend "web" }}
                name: {{ include "psh.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
