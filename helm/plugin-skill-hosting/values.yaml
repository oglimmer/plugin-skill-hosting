# Default values for plugin-skill-hosting

# Name of an existing Secret (or SealedSecret) holding the application's
# sensitive values. When empty, the chart resolves the name to
# "<release>-<chart>-secret" (see psh.secretName in templates/_helpers.tpl).
# The chart does NOT create this Secret — supply one yourself (e.g. a
# SealedSecret in your environment overlay, or a plain Secret produced by
# `kubectl create secret generic ...`). Required keys:
#   - JWT_SECRET
#   - POSTGRES_PASSWORD          (when postgres.enabled=true)
#   - DATABASE_URL               (when postgres.enabled=false)
# Optional keys:
#   - ANTHROPIC_API_KEY          (enables /api/skills/validate)
#   - OIDC_CLIENT_SECRET         (when auth.mode=oidc)
#   - METRICS_TOKEN              (when backend.metrics.exposeOnIngress=true)
#   - EXTERNAL_GIT_TOKEN         (when externalGit.remoteURL is set with an HTTPS remote)
#   - MCP_OAUTH_CLIENT_SECRET    (when mcpOAuth.clientID is set)
#   - SMTP_PASSWORD              (when smtp.host is set and the relay needs auth)
#   - API_TOKEN_ENC_KEY          (optional; 32-byte hex. Encrypts API tokens at
#                                 rest. Derived from JWT_SECRET if unset — set a
#                                 dedicated key to decouple from JWT_SECRET rotation)
existingSecret: ""

# Public URL (must be HTTPS — Claude Code rejects http:// plugin sources).
# (The legacy top-level replicaCount is gone — replicas are now per-component:
# see backend.replicaCount and frontend.replicaCount. Scaling them
# independently matters because the backend owns RWO state, see
# backend.persistence below.)
# This is exposed to the backend as PUBLIC_BASE_URL and embedded in marketplace.json.
publicBaseURL: "https://ai-plugins.oglimmer.com"

# CORS allowlist for browser cross-origin requests (sets CORS_ALLOWED_ORIGINS).
# Leave empty and the backend locks CORS to publicBaseURL's own origin — correct
# for the same-origin SPA, but it blocks browser-based MCP tools served from
# another origin (e.g. the MCP Inspector at http://localhost:6274, which fetches
# /mcp directly). Add those origins here to allow them. Use ["*"] to allow any
# origin (dev only). Exact scheme+host[:port] match, no trailing slash.
corsAllowedOrigins: []
  # - http://localhost:6274

# Name shown in marketplace.json (also used as the owner name).
marketplaceName: "oglimmer-marketplace"

# Default license prefilled in the "new plugin" form.
defaultLicense: "MIT"

# Enterprise team rollout (presentation only). When true, the connect UI leads
# with how an admin distributes the marketplace / plugins / MCP server via
# Claude Code managed settings; the per-user personal-token setup moves behind
# an "expert mode" toggle.
enterpriseMode: false

# Anthropic / Claude API integration. The API key itself goes into the sealed
# secret under the ANTHROPIC_API_KEY key; only the model id is set here.
anthropic:
  model: "claude-sonnet-4-6"

# Authentication mode: "password" (built-in email/password + JWT) or "oidc"
# (OpenID Connect Authorization Code flow). When mode=oidc, the sealed secret
# must additionally carry OIDC_CLIENT_SECRET; the other OIDC_* values are
# read from below.
auth:
  mode: oidc
  oidc:
    issuerURL: "https://id.oglimmer.de/realms/oglimmer"
    clientID: "plugin-skill-hosting"
    # Defaults to "${publicBaseURL}/api/auth/oidc/callback" when empty.
    redirectURL: ""
    scopes: "openid email profile"
    # Google Workspace allowlist. Only enforced when the issuer is Google
    # (https://accounts.google.com); a no-op for any other IdP, so test
    # providers like Keycloak are unaffected. Empty = no restriction.
    # Multiple domains allowed; with exactly one, the auth URL is decorated
    # with hd=<domain> so Google pre-filters the account chooser.
    googleWorkspaceDomains: []
    # - yourcompany.com
    # - subsidiary.com

# Backend (API + git smart-HTTP) configuration
backend:
  name: api
  # Number of backend pods. Must stay at 1 when persistence.enabled=true and
  # persistence.accessMode is ReadWriteOnce — multiple replicas would either
  # fail to schedule (the PVC can only attach to one node) or, on storage
  # classes that silently allow it, race on the same git repo on disk and
  # corrupt it. The chart enforces this with a hard fail at render time.
  # To run >1 replica: switch persistence.accessMode to ReadWriteMany on a
  # shared storage class, or set persistence.enabled=false together with
  # rematerializeOnStartup=true (note: that still gives each pod its own
  # ephemeral /data, so concurrent pushes are *not* coordinated).
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/plugin-skill-hosting-backend
    pullPolicy: Always
    tag: ""

  service:
    type: ClusterIP
    port: 8080

  # Prometheus metrics on /metrics.
  #   enabled          = adds prometheus.io/scrape pod annotations (cluster scrape).
  #   exposeOnIngress  = adds /metrics to the public ingress. Only safe when a
  #                      METRICS_TOKEN is present in the sealed secret — the
  #                      backend then requires `Authorization: Bearer <token>`.
  # The token value itself lives in the sealed secret under METRICS_TOKEN
  # (optional — if absent, /metrics is open inside the cluster).
  metrics:
    enabled: true
    exposeOnIngress: false

  # Re-build all git repos from the database in a background goroutine on
  # startup. Set to true when persistence.enabled=false (emptyDir / no PVC)
  # so git repos survive without persistent storage.
  rematerializeOnStartup: false

  # PVC holding the bare git repos and worktrees (DATA_DIR=/data)
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Extra environment variables injected verbatim into the backend container.
  # Useful for feature flags, tuning knobs, or any env var not covered above.
  # Example:
  #   extraEnv:
  #     - name: MY_FLAG
  #       value: "true"
  #     - name: SECRET_VAL
  #       valueFrom:
  #         secretKeyRef:
  #           name: my-secret
  #           key: MY_KEY
  extraEnv: []

# Optional one-way mirror of the whole marketplace to a single external git
# repository (GitHub, GitLab, …). Disabled when remoteURL is empty. The
# external repo gets a `plugins/<name>/` subtree per plugin plus a generated
# README; the token is read from the application Secret under
# EXTERNAL_GIT_TOKEN. SSH remotes (git@…) don't need a token but the chart
# does not currently mount an SSH key.
externalGit:
  remoteURL: "https://github.com/oglimmer/skill-sync.git"
  branch: main
  username: x-access-token

# OAuth 2.1 authorization server for the /mcp endpoint. Disabled until
# clientID is non-empty. When enabled, the sealed secret must additionally
# carry MCP_OAUTH_CLIENT_SECRET. Leave redirectURIs empty to fall back to
# the backend's compiled-in default (Claude.ai's hosted MCP callback URL).
mcpOAuth:
  clientID: "xxx"
  redirectURIs:
    - https://claude.ai/api/mcp/auth_callback
    # - http://localhost:6274/oauth/callback

# Scheduled skill security audit. When enabled (and ANTHROPIC_API_KEY is set in
# the sealed secret), a background job re-evaluates every skill for harmful or
# malicious behavior on `interval`, stores the verdict, and emails `alertEmails`
# when a skill's risk score (0-100) reaches `alertThreshold`. Sending email
# additionally requires the `smtp` block below to be configured.
audit:
  enabled: true
  interval: 24h          # Go duration: 24h (daily), 168h (weekly)
  alertThreshold: 70     # 0-100; alert when a skill's risk score >= this
  alertEmails: []        # recipients of threat alerts
    # - security@example.com

# SMTP for outbound alert email. Leave host empty to disable email — the audit
# job then logs alerts instead of sending them. The password goes into the
# sealed secret under the SMTP_PASSWORD key (optional).
smtp:
  host: ""
  port: 587
  username: ""
  from: ""
  useTLS: true

# Frontend (nginx serving the SPA) configuration
frontend:
  name: web
  # Number of frontend (nginx) pods. Safe to scale freely — the frontend is
  # stateless and holds no PVC.
  replicaCount: 1
  image:
    repository: ghcr.io/oglimmer/plugin-skill-hosting-frontend
    pullPolicy: Always
    tag: ""

  service:
    type: ClusterIP
    port: 80

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Bundled Postgres (single-replica, PVC-backed). Set enabled=false to use an
# external database — then provide the full DSN via the sealed secret's
# DATABASE_URL key and clear postgres.* below.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  user: marketplace
  database: marketplace
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Ingress configuration. Cert-manager + ingress-nginx pattern from the dsa chart.
# Path order matters — backend paths must come BEFORE the frontend catch-all.
ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: "oglimmer-com-dns"
    # Git smart-HTTP needs request body buffering off and a generous body size
    # for pushes; the nginx ingress defaults are fine for clones.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # MCP Streamable HTTP keeps a long-lived GET stream open for SSE; turn off
    # response buffering and raise the read/send timeouts so events flow
    # immediately and the stream isn't reaped after 60s.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: ai-plugins.oglimmer.com
      paths:
        - path: /api
          pathType: Prefix
          backend: api
        - path: /git
          pathType: Prefix
          backend: api
        - path: /mcp
          pathType: Prefix
          backend: api
        - path: /marketplace.json
          pathType: Exact
          backend: api
        - path: /healthz
          pathType: Exact
          backend: api
        - path: /readyz
          pathType: Exact
          backend: api
        - path: /.well-known/oauth-authorization-server
          pathType: Exact
          backend: api
        # Prefix covers both the bare resource-metadata path and the
        # /mcp-suffixed variant the 401 challenge points clients at. Without
        # this the path falls through to the SPA catch-all and clients get
        # HTML instead of JSON, breaking OAuth discovery.
        - path: /.well-known/oauth-protected-resource
          pathType: Prefix
          backend: api
        - path: /oauth
          pathType: Prefix
          backend: api
        - path: /
          pathType: Prefix
          backend: web
  tls:
    - secretName: tls-plugin-skill-hosting-ingress-dns
      hosts:
        - ai-plugins.oglimmer.com

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod-level security context. fsGroup matches the backend uid so the PVC is
# group-writable.
podSecurityContext:
  fsGroup: 10001

# Backend container security context. The Go binary runs as a non-root user;
# git operations and writes to /data work as long as fsGroup matches.
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# Frontend (nginx) container security context. Rendered onto the web
# container when non-empty. Default is empty because the stock nginx:alpine
# entrypoint needs CHOWN/SETUID/SETGID/DAC_OVERRIDE to fix permissions on
# /var/cache/nginx and switch to the nginx user — `drop: [ALL]` breaks it.
# To opt in to hardening, either:
#   (a) use an unprivileged nginx image (e.g. nginxinc/nginx-unprivileged)
#       and set `capabilities.drop: [ALL]`, or
#   (b) keep the stock image and drop only the unused caps explicitly:
#         capabilities:
#           drop: [ALL]
#           add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, NET_BIND_SERVICE]
frontendSecurityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

deploymentAnnotations: {}

imagePullSecrets: []
