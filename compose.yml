services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marketplace}"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-marketplace}:${POSTGRES_PASSWORD:-marketplace}@db:5432/${POSTGRES_DB:-marketplace}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-32-chars-min}
      # Local-dev only: lets the backend boot with the insecure default
      # JWT_SECRET above. Production (Helm) must NOT set this and must
      # supply a real 32+ char JWT_SECRET, or the backend refuses to start.
      ALLOW_INSECURE_JWT_SECRET: ${ALLOW_INSECURE_JWT_SECRET:-true}
      LISTEN_ADDR: ":8080"
      DATA_DIR: /data
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      MARKETPLACE_NAME: ${MARKETPLACE_NAME:-oglimmer-marketplace}
      DEFAULT_LICENSE: ${DEFAULT_LICENSE:-MIT}
      # Auth: "password" (default, dev) or "oidc"
      AUTH_MODE: ${AUTH_MODE:-password}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Scheduled skill security audit (optional): when AUDIT_ENABLED=true and an
      # ANTHROPIC_API_KEY is set, every skill is periodically checked for harmful
      # behavior and alerts are emailed once a risk score crosses the threshold.
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      AUDIT_INTERVAL: ${AUDIT_INTERVAL:-24h}
      AUDIT_ALERT_THRESHOLD: ${AUDIT_ALERT_THRESHOLD:-70}
      AUDIT_ALERT_EMAILS: ${AUDIT_ALERT_EMAILS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # External git mirror (optional): when EXTERNAL_GIT_REMOTE_URL is set the
      # marketplace is one-way mirrored to that single repo on every change.
      EXTERNAL_GIT_REMOTE_URL: ${EXTERNAL_GIT_REMOTE_URL:-}
      EXTERNAL_GIT_BRANCH: ${EXTERNAL_GIT_BRANCH:-main}
      EXTERNAL_GIT_USERNAME: ${EXTERNAL_GIT_USERNAME:-x-access-token}
      EXTERNAL_GIT_TOKEN: ${EXTERNAL_GIT_TOKEN:-}
    volumes:
      - repo_data:/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
  repo_data:
