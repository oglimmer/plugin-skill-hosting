# Front door for the Docker Compose deployment: serves the Vue SPA from disk
# and proxies every backend path to the backend service.
#
# In Helm the cluster Ingress does the path → Service routing before traffic
# reaches this pod, so the proxy `location` blocks below are unreachable there
# and only the SPA blocks (`/assets/`, `/index.html`, `/`) actually serve.
# Same image, same config in both deployments — when you add a new backend
# path, add it to BOTH this file AND helm/plugin-skill-hosting/values.yaml
# (under `ingress.hosts[].paths`) so Compose and Helm stay in sync.
server {
    listen 80;
    server_name _;

    client_max_body_size 4m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               font/woff2 image/svg+xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public marketplace JSON
    location = /marketplace.json {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Git smart HTTP — Claude Code clones plugins from here
    location /git/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP Streamable HTTP — long-lived SSE GET stream + JSON-RPC POST/DELETE.
    # Buffering off so events flow immediately; long timeouts so the stream
    # isn't reaped after the default 60s.
    location /mcp {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://backend:8080;
    }

    # OAuth 2.1 authorization server for /mcp — RFC 8414 discovery + endpoints.
    location = /.well-known/oauth-authorization-server {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /oauth/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build artifacts — safe to cache forever
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA entry — must always revalidate so deploys take effect
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
